<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة محمد الرقمية الكبرى ⚡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle, #0f172a, #020617); color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 30px; min-height: 100vh; }
        h1 { color: #38bdf8; font-size: 42px; text-shadow: 0 0 20px #0284c7; margin-top: 20px; animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px #38bdf8; } to { text-shadow: 0 0 25px #0284c7, 0 0 35px #0369a1; } }
        p { color: #94a3b8; font-size: 18px; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 900px; margin: 0 auto; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 16px; border: 2px solid #334155; text-decoration: none; color: white; font-weight: bold; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.4s ease; display: block; }
        .card:hover { border-color: #38bdf8; background: #2563eb; transform: translateY(-10px) scale(1.02); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4); }
        .ad-zone { background: linear-gradient(90deg, #1e293b, #334155); padding: 20px; margin: 30px auto; max-width: 728px; border-radius: 12px; color: #38bdf8; font-weight: bold; border: 1px dashed #0284c7; box-shadow: 0 0 15px rgba(2, 132, 199, 0.2); }
    </style>
</head>
<body>
    <div class="ad-zone">💰 مساحة إعلانية ذهبية - أرباح بالدولار تفعل هنا 💰</div>
    
    <h1>👑 منصة محمد لخدمات الويب والألعاب 👑</h1>
    <p>أهلاً بك في أقوى موقع ترفيهي رقمي بمصر. تصفح الأقسام مجاناً بالكامل!</p>
    
    <div class="grid">
        <a href="games.html" class="card">🎮 لعبة التحدي السريع والذكاء السري</a>
        <a href="security.html" class="card">🔒 أداة الحماية وتوليد السيرفرات الآمنة</a>
    </div>

    <div class="ad-zone">💰 مساحة إعلانية سفلية لمضاعفة المشاهدات والأرباح 💰</div>
</body>
</html>
