<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ كلمات المرور الحديدية 🔒</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        .box { background: #0f172a; padding: 40px; border-radius: 20px; border: 2px solid #22c55e; max-width: 500px; margin: 0 auto; box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        h1 { color: #22c55e; margin-bottom: 20px; }
        .pass-display { background: #1e293b; padding: 15px; font-size: 22px; border-radius: 8px; font-family: monospace; border: 1px solid #334155; margin-bottom: 20px; color: #22c55e; word-break: break-all; }
        button { padding: 12px 30px; font-size: 18px; background: #22c55e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #16a34a; box-shadow: 0 0 15px #22c55e; }
        .ad-space { background: #1e293b; padding: 15px; margin-top: 25px; border-radius: 10px; color: #94a3b8; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; background-color: #1e293b; color: #22c55e; text-decoration: none; font-weight: bold; border-radius: 8px; border: 1px solid #16a34a; transition: 0.3s; }
        .back-btn:hover { background-color: #22c55e; color: white; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔒 منشئ حماية الحسابات والسيرفرات 🔒</h1>
        <div class="pass-display" id="passOut">اضغط لإنشاء كلمة مرور حديدية</div>
        <button onclick="genPass()">توليد كلمة مرور مشفرة ⚡</button>
        <div class="ad-space">💰 مساحة إعلانية ممتازة 💰</div>
        
        <!-- زر العودة لصفحة محمد المطور -->
        <a href="mohamed.html" class="back-btn">⬅️ العودة لمنصة محمد الرئيسية</a>
    </div>

    <script>
        function genPass() {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let password = "";
            for (let i = 0; i < 14; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById("passOut").innerHTML = password;
        }
    </script>
</body>
</html>
